
services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cacheserver-container
    ports:
      - "8080:8080"
    environment:
      - DUMPER_PATH=/data/dump.bin
    volumes:
      - ./data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-container
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped